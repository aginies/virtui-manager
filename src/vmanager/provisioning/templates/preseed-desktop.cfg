# Desktop Debian Preseed Configuration
# Generated for VirtUI Manager - Desktop Installation

# Disable media scanning and auto-answer prompts
d-i apt-setup/cdrom/set-first boolean false
d-i apt-setup/cdrom/set-next boolean false
d-i apt-setup/cdrom/set-failed boolean false
d-i apt-setup/disable-cdrom-entries boolean true

# Locale and keyboard
d-i debian-installer/locale string {locale}
d-i keyboard-configuration/xkb-model select pc105
d-i keyboard-configuration/xkb-layout select {keyboard}

# Network configuration
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string {hostname}
d-i netcfg/get_domain string unassigned-domain
d-i netcfg/wireless_wep string
# Force hostname override
d-i netcfg/hostname seen true
d-i netcfg/domain seen true

# Mirror settings
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true

# User setup
d-i passwd/root-password password {root_password}
d-i passwd/root-password-again password {root_password}
d-i passwd/user-fullname string {username}
d-i passwd/username string {username}
d-i passwd/user-password password {password}
d-i passwd/user-password-again password {password}
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

# Clock and time zone
d-i clock-setup/utc boolean true
d-i time/zone string {timezone}
d-i clock-setup/ntp boolean true

# Disk partitioning with more space for desktop (use all available space with EFI and LVM)
d-i partman-auto/disk string {disk_device}
d-i partman-auto/method string lvm
d-i partman-efi/non_efi_system boolean true
d-i partman-auto/expert_recipe string \
    efi-boot-lvm :: \
        512 512 512 fat32 \
            $primary{ } \
            $iflabel{ gpt } \
            $reusemethod{ } \
            method{ efi } \
            format{ } \
        . \
        512 512 512 ext4 \
            $primary{ } \
            $bootable{ } \
            method{ format } \
            format{ } \
            use_filesystem{ } \
            filesystem{ ext4 } \
            mountpoint{ /boot } \
        . \
        1000 10000 -1 ext4 \
            $defaultignore{ } \
            $primary{ } \
            method{ lvm } \
            vg_name{ vg00 } \
        . \
        8192 8192 8192 linux-swap \
            $lvmok{ } \
            in_vg{ vg00 } \
            lv_name{ swap } \
            method{ swap } \
            format{ } \
        . \
        10000 20000 -1 ext4 \
            $lvmok{ } \
            in_vg{ vg00 } \
            lv_name{ root } \
            method{ format } \
            format{ } \
            use_filesystem{ } \
            filesystem{ ext4 } \
            mountpoint{ / } \
        .
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-auto-lvm/guided_size string max
d-i partman-auto-lvm/new_vg_name string vg00
d-i partman-auto/purge_lvm_from_device boolean true
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Package selection - Desktop environment (GNOME)
tasksel tasksel/first multiselect desktop, gnome-desktop
d-i pkgsel/include string openssh-server curl wget git vim firefox-esr \
    htop tree build-essential python3-pip \
    libreoffice gimp vlc thunderbird network-manager-gnome
d-i pkgsel/upgrade select safe-upgrade
popularity-contest popularity-contest/participate boolean false

# Boot loader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string {disk_device}

# X11 and desktop setup
xserver-xorg xserver-xorg/autodetect_monitor boolean true
xserver-xorg xserver-xorg/config/monitor/selection-method select medium
xserver-xorg xserver-xorg/config/monitor/mode-list select 1024x768 @ 60 Hz

# Finish installation
d-i finish-install/reboot_in_progress note

# Post-installation commands for desktop
d-i preseed/late_command string \
    in-target systemctl enable ssh; \
    in-target systemctl enable gdm3; \
    in-target systemctl set-default graphical.target; \
    in-target echo "Desktop preseed installation completed" > /var/log/preseed.log
