# Basic Ubuntu Preseed Configuration
# Generated for VirtUI Manager

# Locale and keyboard
d-i debian-installer/locale string {locale}
d-i keyboard-configuration/xkb-keymap select {keyboard}

# Network configuration
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string {hostname}
d-i netcfg/get_domain string localdomain
d-i netcfg/wireless_wep string

# Mirror settings
d-i mirror/country string manual
d-i mirror/http/hostname string archive.ubuntu.com
d-i mirror/http/directory string /ubuntu
d-i mirror/http/proxy string

# User setup
d-i passwd/user-fullname string {username}
d-i passwd/username string {username}
d-i passwd/user-password password {password}
d-i passwd/user-password-again password {password}
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

# Clock and time zone
d-i clock-setup/utc boolean true
d-i time/zone string {timezone}
d-i clock-setup/ntp boolean true

# Disk partitioning
d-i partman-auto/disk string {disk_device}
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Package selection
tasksel tasksel/first multiselect ubuntu-server
d-i pkgsel/include string openssh-server curl wget vim htop
d-i pkgsel/upgrade select safe-upgrade
d-i pkgsel/update-policy select none

# Boot loader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string {disk_device}

# Finish installation
d-i finish-install/reboot_in_progress note

# Post-installation commands
d-i preseed/late_command string \
    in-target systemctl enable ssh; \
    in-target echo "Preseed installation completed" > /var/log/preseed.log