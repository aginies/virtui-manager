# Fedora Kickstart configuration - Server
# Generated by VirtUI Manager

# Use text mode install
text

# Language and keyboard
lang {locale}
keyboard {keyboard}

# Timezone
timezone {timezone} --isUtc

# Root password
rootpw --iscrypted {root_password}

# User setup
user --name={username} --password={user_password} --iscrypted --groups=wheel

# Network configuration
network --bootproto=dhcp --device={network_interface} --activate --hostname={vm_name}

# Partitioning
ignoredisk --only-use=vda
clearpart --all --initlabel
autopart

# Bootloader
bootloader --location=mbr

# Repository
url --mirrorlist=https://mirrors.fedoraproject.org/mirrorlist?repo=fedora-$releasever&arch=$basearch

# Packages
%packages
@^server-product-environment
openssh-server
qemu-guest-agent
%end

# Services
services --enabled=sshd,qemu-guest-agent

# Reboot after installation
reboot
