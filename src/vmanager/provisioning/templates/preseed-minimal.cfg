# Minimal Debian Preseed Configuration
# Generated for VirtUI Manager - Minimal Installation

# Disable media scanning and auto-answer prompts
d-i apt-setup/cdrom/set-first boolean false
d-i apt-setup/cdrom/set-next boolean false
d-i apt-setup/cdrom/set-failed boolean false
d-i apt-setup/disable-cdrom-entries boolean true

# Locale and keyboard (minimal)
d-i debian-installer/locale string {locale}
d-i debian-installer/locale seen true
d-i keyboard-configuration/xkb-model select pc105
d-i keyboard-configuration/xkb-layout select {keyboard}
d-i keyboard-configuration/xkb-layout seen true
d-i keyboard-configuration/xkb-keymap seen true

# Network configuration (basic DHCP)
d-i netcfg/choose_interface select auto
d-i netcfg/dhcp_timeout string 60
d-i netcfg/get_hostname string {hostname}
d-i netcfg/get_domain string lan.local
d-i netcfg/hostname seen true
d-i netcfg/get_domain seen true
d-i netcfg/wireless_wep string

# Mirror settings (default Debian)
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true

# User setup (simple)
d-i passwd/root-password-crypted password {root_password}
d-i passwd/root-password seen true
d-i passwd/user-fullname string {username}
d-i passwd/username string {username}
d-i passwd/user-password-crypted password {password}
d-i passwd/user-password seen true
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

# Clock (UTC)
d-i clock-setup/utc boolean true
d-i clock-setup/utc seen true
d-i time/zone string {timezone}
d-i time/zone seen true
d-i clock-setup/ntp boolean true

# Disk partitioning (automatic with EFI and Swap)
d-i partman-auto/method string regular
d-i partman-efi/non_efi_system boolean true
d-i partman-partitioning/choose_label select gpt
d-i partman-partitioning/default_label string gpt
d-i partman/choose_label select gpt
d-i partman-auto/expert_recipe string \
    efi-boot-root-swap :: \
        512 512 512 fat32 \
            $primary{ } \
            $iflabel{ gpt } \
            $reusemethod{ } \
            method{ efi } \
            format{ } \
        . \
        1024 1024 1024 linux-swap \
            method{ swap } \
            format{ } \
        . \
        512 10000 -1 ext4 \
            $primary{ } \
            $bootable{ } \
            method{ format } \
            format{ } \
            use_filesystem{ } \
            filesystem{ ext4 } \
            mountpoint{ / } \
        .
d-i partman-auto/choose_recipe select efi-boot-root-swap
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman/confirm_write_new_label boolean true
d-i partman-auto/purge_lvm_from_device boolean true

# Package selection (minimal)
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string openssh-server
d-i pkgsel/upgrade select none
popularity-contest popularity-contest/participate boolean false

# Boot loader (simple)
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string default
d-i grub-installer/timeout string 1

# Finish installation (quick reboot)
d-i finish-install/reboot_in_progress note
d-i finish-install/keep-consoles boolean true
