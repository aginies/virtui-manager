# Minimal Ubuntu Preseed Configuration
# Generated for VirtUI Manager - Minimal Installation

# Locale and keyboard (minimal)
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# Network configuration (basic DHCP)
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string {hostname}
d-i netcfg/get_domain string localdomain

# Mirror settings (default Ubuntu)
d-i mirror/country string manual
d-i mirror/http/hostname string archive.ubuntu.com
d-i mirror/http/directory string /ubuntu

# User setup (simple)
d-i passwd/user-fullname string {username}
d-i passwd/username string {username}
d-i passwd/user-password password {password}
d-i passwd/user-password-again password {password}
d-i user-setup/allow-password-weak boolean true

# Clock (UTC)
d-i clock-setup/utc boolean true
d-i time/zone string UTC

# Disk partitioning (automatic, single partition)
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Package selection (minimal)
tasksel tasksel/first multiselect ubuntu-server
d-i pkgsel/include string openssh-server
d-i pkgsel/upgrade select none

# Boot loader (simple)
d-i grub-installer/only_debian boolean true

# Finish installation (quick reboot)
d-i finish-install/reboot_in_progress note