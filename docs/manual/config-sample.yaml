# VirtUI Manager Configuration File
# 
# Copy this file to ~/.config/virtui-manager/config.yaml and customize as needed.

# Custom ISO repositories for VM provisioning
# These repositories will appear in the distribution dropdown during VM creation
custom_ISO_repo:
  # Example: Slackware Linux ISOs from official mirror
  - name: Slackware 15
    uri: https://mirrors.slackware.com/slackware/slackware-iso/slackware64-15.0-iso/
  
  # Example: Qubes OS ISOs from kernel.org mirror
  - name: Qubes R4 3.0
    uri: https://mirrors.edge.kernel.org/qubes/iso/
  
  # Example: Local directory with Windows ISOs
  - name: Windows
    uri: /mnt/install/ISO/win/
  
  # Example: Local directory using file:// protocol
  - name: Local ISOs
    uri: file:///home/user/Downloads/isos/
  
  # Example: Ubuntu ISOs from official mirror
  - name: Ubuntu Releases
    uri: https://releases.ubuntu.com/
  
  # Example: Debian ISOs from official mirror  
  - name: Debian ISOs
    uri: https://cdimage.debian.org/debian-cd/current/amd64/iso-cd/

# Server connections (libvirt URIs)
servers:
  - name: Localhost
    uri: qemu:///system
  # - name: Remote Server
  #   uri: qemu+ssh://user@server/system

# Directory where downloaded ISOs are cached
ISO_DOWNLOAD_PATH: ~/.cache/virtui-manager/isos

# Automated Installation Pre-fill
# Configure default values for automated installation templates
# These values will automatically populate the installation fields when creating VMs
# Configure via Template Management UI (press 't' and click 'Auto-Fill' button)
AUTO_INSTALL_PRE_FILL:
  root_password: "your_secure_root_password"
  username: "your_preferred_username"
  user_password: "your_secure_user_password"
  keyboard: "us"              # Keyboard layout (us, fr, de, it, etc.)
  language: "English (US)"    # System language

AUTO_INSTALL_PORT: 8000
CACHE_TTL: 300

# SUSE Customer Center (SCC) Configuration
# Configure SCC registration for automated SUSE product installations
# Configure via Template Management UI (press 't' and click 'Auto-Fill' button)
SUSE_SCC:
  scc_email: "your-email@company.com"           # Your SCC account email
  scc_reg_code: "your-scc-registration-code"    # Your SCC registration code
  scc_ha_reg_code: "your-scc-ha-registration-code"
  scc_hpc_reg_code: "your-scc-hpc-registration-code"
  scc_ltss_reg_code: "your-scc-ltss-registration-code"
  scc_lpatching_reg_code: "your-scc-live-patching-registration-code"
  scc_we_reg_code: "your-scc-registration-code"
  scc_product_arch: "x86_64"                    # Target architecture (x86_64, aarch64, s390x, ppc64le)

# Log configuration
LOG_FILE_PATH: ~/.cache/virtui-manager/vm_manager.log
LOG_LEVEL: INFO

# VNC/Console settings
REMOTE_VIEWER: virtui-remote-viewer
REMOTE_WEBCONSOLE: true
VNC_QUALITY: 1
VNC_COMPRESSION: 9

# Network and hardware model options
network_models:
  - virtio
  - e1000
  - e1000e
  - rtl8139
  - ne2k_pci
  - pcnet

sound_models:
  - none
  - ich6
  - ich9
  - ac97
  - sb16
  - usb

# Performance settings
STATS_INTERVAL: 5
WEBSOCKIFY_BUF_SIZE: 4096

# Web console port range
WC_PORT_RANGE_START: 40000
WC_PORT_RANGE_END: 40050

# Paths to external tools
websockify_path: /usr/bin/websockify
novnc_path: /usr/share/novnc/
